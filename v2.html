<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Page – V2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A0900;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
      gap: 20px;
    }

    /* ── Version navigation ── */
    .version-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-arrow {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 18px;
      text-decoration: none;
      color: #8B5A2B;
      background: #2A1400;
      border: 1px solid #4A2600;
      transition: background 0.15s, color 0.15s;
      cursor: default;
      pointer-events: none;
    }

    .nav-arrow.enabled {
      color: #F5D49A;
      cursor: pointer;
      pointer-events: auto;
    }

    .nav-arrow.enabled:hover {
      background: #3D1E00;
      color: #FDE68A;
    }

    .version-dots {
      display: flex;
      gap: 8px;
    }

    .version-dot {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .version-dot.active {
      background: #FDE68A;
      color: #2D1500;
    }

    .version-dot.available {
      color: #C97C2C;
      border-color: #4A2600;
      background: #2A1400;
      cursor: pointer;
    }

    .version-dot.available:hover {
      color: #F5D49A;
      border-color: #7A4210;
    }

    .version-dot.unavailable {
      color: #444;
      border-color: #2A1400;
      background: transparent;
      cursor: default;
    }

    .frame-title {
      color: #C97C2C;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Mobile frame ── */
    .mobile-frame {
      width: 375px;
      height: 812px;
      background: #FFFBF5;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── V2 inner layout ── */
    .v2-inner {
      position: absolute;
      inset: 0;
      padding: 60px 24px 40px;
      display: flex;
      flex-direction: column;
    }

    /* Title */
    .v2-title {
      font-size: 24px;
      font-weight: 600;
      color: #2D1500;
      margin-bottom: 32px;
    }

    /* Form groups */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #2D1500;
      margin-bottom: 4px;
    }

    .form-label .required {
      color: #B91C1C;
    }

    .form-input {
      width: 100%;
      height: 48px;
      background: #FFFBF5;
      border: 1.5px solid #D6B896;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 16px;
      color: #2D1500;
      font-family: inherit;
      outline: none;
    }

    .form-input::placeholder {
      color: #9A6000;
    }

    .field-error {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-size: 12px;
      color: #B91C1C;
    }

    .field-hint {
      margin-top: 4px;
      font-size: 12px;
      color: #92400E;
    }

    /* Button */
    .v2-button {
      width: 100%;
      height: 52px;
      background: #B45309;
      border: none;
      border-radius: 10px;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px; /* 20px group gap already applied above, +4 = 24px total */
    }

    /* Terms */
    .v2-terms {
      margin-top: 16px;
      font-size: 13px;
      color: #92400E;
      text-align: center;
      line-height: 1.5;
    }

    .v2-terms a {
      color: #B45309;
      text-decoration: underline;
    }

    .toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(28, 10, 0, 0.93);
      color: #FDE68A;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }
    .toast.show { opacity: 1; }
    .toast.error { background: rgba(127, 29, 29, 0.97); color: #FCA5A5; }

    .byline {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(180, 83, 9, 0.7);
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <nav class="version-nav">
    <a href="index.html" class="nav-arrow enabled">←</a>
    <div class="version-dots">
      <a href="index.html" class="version-dot available">1</a>
      <span class="version-dot active">2</span>
      <a href="v3.html" class="version-dot available">3</a>
      <a href="v4.html" class="version-dot available">4</a>
      <a href="v5.html" class="version-dot available">5</a>
    </div>
    <a href="v3.html" class="nav-arrow enabled">→</a>
  </nav>

  <p class="frame-title">Version 2 of 5</p>

  <div class="mobile-frame">
    <div class="v2-inner">

      <h1 class="v2-title">Register</h1>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email <span class="required">*</span></label>
        <input
          class="form-input"
          type="email"
          placeholder="Enter your email address"
          autocomplete="off"
        >
        <span class="field-error" id="email-error" style="display:none">⚠ Please enter a valid email address</span>
      </div>

      <!-- Password -->
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Password <span class="required">*</span></label>
        <input
          class="form-input"
          type="password"
          placeholder="Enter your password"
          autocomplete="off"
        >
        <span class="field-hint">Must be at least 8 characters</span>
      </div>

      <button class="v2-button" id="reg-btn" style="margin-top: 24px;">Register</button>

      <p class="v2-terms">
        By registering, you agree to our
        <a href="#">Terms of Service</a>
      </p>

      <div class="toast" id="toast"></div>
    </div>
  </div>

  <script>
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('error', !!isError);
      t.classList.add('show');
      clearTimeout(window._toast);
      window._toast = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function isValidEmail(val) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
    }

    const emailInput = document.querySelector('input[type="email"]');
    const emailError = document.getElementById('email-error');

    emailInput.addEventListener('blur', function () {
      emailError.style.display = (this.value && !isValidEmail(this.value)) ? 'flex' : 'none';
    });
    emailInput.addEventListener('input', function () {
      if (emailError.style.display !== 'none') emailError.style.display = 'none';
    });

    document.getElementById('reg-btn').addEventListener('click', function () {
      const email    = document.querySelector('input[type="email"]').value.trim();
      const password = document.querySelector('input[type="password"]').value;

      if (!email)                        { showToast('Email is required', true); return; }
      if (!isValidEmail(email))          { showToast('Please enter a valid email address', true); return; }
      if (!password)                     { showToast('Password is required', true); return; }
      if (password.length < 8)           { showToast('Password must be at least 8 characters', true); return; }

      showToast('Registration submitted!');
    });
  </script>

  <p class="byline">made by Hans Djalali</p>

</body>
</html>
