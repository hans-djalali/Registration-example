<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Page – V1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A0900;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
      gap: 20px;
    }

    /* ── Version navigation ── */
    .version-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-arrow {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 18px;
      text-decoration: none;
      color: #8B5A2B;
      background: #2A1400;
      border: 1px solid #4A2600;
      transition: background 0.15s, color 0.15s;
      cursor: default;
      pointer-events: none;
    }

    .nav-arrow.enabled {
      color: #F5D49A;
      cursor: pointer;
      pointer-events: auto;
    }

    .nav-arrow.enabled:hover {
      background: #3D1E00;
      color: #FDE68A;
    }

    .version-dots {
      display: flex;
      gap: 8px;
    }

    .version-dot {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .version-dot.active {
      background: #FDE68A;
      color: #2D1500;
    }

    .version-dot.available {
      color: #C97C2C;
      border-color: #4A2600;
      background: #2A1400;
      cursor: pointer;
    }

    .version-dot.available:hover {
      color: #F5D49A;
      border-color: #7A4210;
    }

    .version-dot.unavailable {
      color: #4A2600;
      border-color: #2A1400;
      background: transparent;
      cursor: default;
    }

    .frame-title {
      color: #C97C2C;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Mobile frame ── */
    .mobile-frame {
      width: 375px;
      height: 812px;
      background: #C8C8C8;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── V1 elements ── */

    .v1-title {
      position: absolute;
      top: 60px;
      left: 40px;
      font-size: 24px;
      font-weight: 400;
      color: #999999;
      font-family: inherit;
    }

    .v1-email {
      position: absolute;
      top: 114px;
      left: 40px;
      width: 240px;
      height: 40px;
      background: #B8B8B8;
      border: none;
      outline: none;
      padding: 0 10px;
      font-size: 14px;
      color: #555;
      font-family: inherit;
    }

    .v1-email::placeholder,
    .v1-password::placeholder {
      color: #999999;
    }

    .v1-password {
      position: absolute;
      top: 164px;
      left: 40px;
      width: 240px;
      height: 40px;
      background: #B8B8B8;
      border: none;
      outline: none;
      padding: 0 10px;
      font-size: 14px;
      color: #555;
      font-family: inherit;
    }

    .v1-button {
      position: absolute;
      top: 219px;
      left: 40px;
      width: 100px;
      height: 32px;
      background: #AAAAAA;
      border: none;
      border-radius: 4px;
      color: #666666;
      font-size: 13px;
      font-family: inherit;
      cursor: default;
    }

    .v1-terms {
      position: absolute;
      top: 266px;
      left: 40px;
      font-size: 10px;
      color: #AAAAAA;
      font-family: inherit;
    }

    .toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 26, 0.93);
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }
    .toast.show { opacity: 1; }

    .byline {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(180, 83, 9, 0.7);
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <nav class="version-nav">
    <span class="nav-arrow">←</span>
    <div class="version-dots">
      <span class="version-dot active">1</span>
      <a href="v2.html" class="version-dot available">2</a>
      <a href="v3.html" class="version-dot available">3</a>
      <a href="v4.html" class="version-dot available">4</a>
    </div>
    <a href="v2.html" class="nav-arrow enabled">→</a>
  </nav>

  <p class="frame-title">Version 1 of 4</p>

  <div class="mobile-frame">
    <span class="v1-title">Register</span>

    <input
      class="v1-email"
      type="email"
      placeholder="email"
      autocomplete="off"
    >

    <!-- type="text" intentional — password shown as plain text (V1 flaw) -->
    <input
      class="v1-password"
      type="text"
      placeholder="password"
      autocomplete="off"
    >

    <button class="v1-button" id="reg-btn">register</button>

    <span class="v1-terms">by clicking register you agree to terms</span>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('reg-btn').addEventListener('click', function () {
      showToast('Registration submitted!');
    });
  </script>

  <p class="byline">made by Hans Djalali</p>

</body>
</html>
